<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- motif tenun/sutera Bugis (Lipa' Sabbe) — kotak-kotak emas & marun -->
  <rect width="48" height="48" fill="#6b2f3a"/>
  <rect x="0"  y="0"  width="24" height="24" fill="#b08d57"/>
  <rect x="24" y="24" width="24" height="24" fill="#b08d57"/>
  <g stroke="#e7d4ad" stroke-width="2" opacity="0.8">
    <line x1="0" y1="24" x2="48" y2="24"/>
    <line x1="24" y1="0" x2="24" y2="48"/>
  </g>
  <g stroke="#4a3a52" stroke-width="1" opacity="0.6">
    <line x1="0" y1="12" x2="48" y2="12"/>
    <line x1="0" y1="36" x2="48" y2="36"/>
    <line x1="12" y1="0" x2="12" y2="48"/>
    <line x1="36" y1="0" x2="36" y2="48"/>
  </g>
  <g fill="#e7d4ad" opacity="0.85">
    <circle cx="12" cy="12" r="2"/><circle cx="36" cy="36" r="2"/>
  </g>
  <g fill="#6b2f3a" opacity="0.7">
    <circle cx="36" cy="12" r="1.6"/><circle cx="12" cy="36" r="1.6"/>
  </g>
</svg>
