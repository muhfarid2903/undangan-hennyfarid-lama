<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kelola Daftar Tamu — Henny &amp; Farid</title>
<style>
  :root { --gold:#b89b6e; --ink:#3f3933; --line:#e4d9c8; --green:#25D366; }
  * { box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, Segoe UI, sans-serif; color: var(--ink);
         max-width: 960px; margin: 0 auto; padding: 20px; background:#faf6f0; line-height:1.5; }
  h1 { font-size: 22px; margin: 0 0 2px; }
  .sub { color:#8a7d70; font-size:14px; margin-bottom:18px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:16px; }
  label { font-size:12px; font-weight:600; display:block; margin-bottom:4px; }
  input { width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:8px;
          font-family:inherit; font-size:14px; }
  .row { display:flex; gap:10px; flex-wrap:wrap; }
  .row > div { flex:1; min-width:140px; }
  button { cursor:pointer; border:none; border-radius:8px; font-family:inherit; font-size:14px; }
  .btn-main { background:var(--gold); color:#fff; padding:11px 22px; font-weight:600; }
  .btn-sm { padding:6px 11px; font-size:13px; }
  .btn-wa { background:var(--green); color:#fff; text-decoration:none; display:inline-block; }
  .btn-copy { background:#efe7d8; color:var(--ink); }
  .btn-link { background:#eee; color:var(--ink); text-decoration:none; display:inline-block; }
  .btn-del { background:#fdecea; color:#c0392b; font-size:15px; line-height:1; padding:6px 9px; }
  table { width:100%; border-collapse:collapse; margin-top:6px; font-size:13px; }
  th, td { text-align:left; padding:9px 8px; border-bottom:1px solid var(--line); vertical-align:middle; }
  th { font-size:12px; color:#8a7d70; text-transform:uppercase; letter-spacing:.5px; }
  .name { font-weight:600; }
  .actions { white-space:nowrap; display:flex; gap:6px; flex-wrap:wrap; }
  .toolbar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .count { font-size:13px; color:#8a7d70; }
  .badge { font-size:11px; padding:2px 9px; border-radius:20px; font-weight:600; }
  .b-hadir { background:#e8f5e9; color:#2e7d32; }
  .b-tidak { background:#fdecea; color:#c0392b; }
  .b-ragu  { background:#fff8e1; color:#b8860b; }
  .b-none  { background:#eee; color:#999; }
  .search { max-width:280px; }
  .muted { color:#8a7d70; font-size:12px; }
  #msg { font-size:13px; margin-left:6px; }
</style>
</head>
<body>
  <h1>Kelola Daftar Tamu</h1>
  <div class="sub">Terhubung ke Google Sheet <b>DaftarTamu</b> — semua perubahan tersimpan & terlihat oleh semua petugas.</div>

  <div class="card">
    <label>Tambah tamu</label>
    <div class="row">
      <div><input id="i-name" placeholder="Nama tamu *" /></div>
      <div><input id="i-phone" placeholder="No. WA (mis. 0812..)" /></div>
      <div><input id="i-pic" placeholder="Petugas (opsional)" /></div>
    </div>
    <div class="toolbar" style="margin-top:10px">
      <button class="btn-main" id="btn-add">+ Tambah ke daftar</button>
      <span id="msg"></span>
    </div>
    <div class="muted" style="margin-top:8px">Tips: isi No. WA agar tombol "Kirim WA" langsung menuju chat tamu itu.</div>
  </div>

  <div class="card">
    <div class="toolbar" style="margin-bottom:10px">
      <input class="search" id="search" placeholder="Cari nama / petugas…" />
      <span class="count" id="count"></span>
      <button class="btn-sm btn-copy" id="btn-refresh">↻ Muat ulang</button>
      <button class="btn-sm btn-copy" id="btn-csv">Unduh CSV</button>
    </div>
    <table id="tbl">
      <thead><tr><th>#</th><th>Nama</th><th>Petugas</th><th>RSVP</th><th>Aksi</th></tr></thead>
      <tbody><tr><td colspan="5" class="muted">Memuat…</td></tr></tbody>
    </table>
  </div>

<script>
  // URL Web App Apps Script (sama dengan undangan & scanner)
  const SHEET_URL = "https://script.google.com/macros/s/AKfycbzqM4DMZ1dNKzlCeBfh0NKS1c8SRcGqaicpK2k-1f8GSJwpD8bUpK13HmWRgYiRA2VD_g/exec";

  const $ = s => document.querySelector(s);
  let guests = [];
  let rsvpMap = {};

  function esc(s){ return String(s||"").replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  // Nomor WA -> format internasional 62…
  function waPhone(p){
    p = String(p||"").replace(/\D/g, "");
    if (!p) return "";
    if (p.startsWith("0"))  return "62" + p.slice(1);
    if (p.startsWith("62")) return p;
    if (p.startsWith("8"))  return "62" + p;
    return p;
  }

  // Kata-kata pesan undangan WhatsApp (nama & link otomatis per tamu)
  function waMessage(g){
    return "Kepada Yth.\n" +
      "Bapak/Ibu/Saudara/i\n" +
      (g.name || "") + "\n" +
      "___________________\n\n" +
      "Tanpa mengurangi rasa hormat, perkenankan kami mengundang Bapak/Ibu/Saudara/i, teman sekaligus sahabat, untuk menghadiri acara pernikahan kami.\n\n" +
      "Berikut link undangan kami, untuk info lengkap dari acara, bisa kunjungi :\n\n" +
      (g.link || "") + "\n\n" +
      "Merupakan suatu kebahagiaan bagi kami apabila Bapak/Ibu/Saudara/i berkenan untuk hadir dan memberikan doa restu.\n\n" +
      "Terima Kasih\n\n" +
      "Hormat kami,\n" +
      "Henny & Farid\n" +
      "__________________";
  }

  function badge(status){
    const s = (status||"").toLowerCase();
    if (s.indexOf("hadir") === 0) return '<span class="badge b-hadir">Hadir</span>';
    if (s.indexOf("tidak") === 0) return '<span class="badge b-tidak">Tdk Hadir</span>';
    if (s.indexOf("ragu") === 0)  return '<span class="badge b-ragu">Ragu</span>';
    return '<span class="badge b-none">—</span>';
  }

  function render() {
    const q = $("#search").value.trim().toLowerCase();
    const rows = guests.filter(g =>
      !q || (g.name||"").toLowerCase().includes(q) || (g.pic||"").toLowerCase().includes(q));
    $("#count").textContent = rows.length + " / " + guests.length + " tamu";
    const tb = $("#tbl tbody");
    if (!guests.length) { tb.innerHTML = '<tr><td colspan="5" class="muted">Belum ada tamu. Tambahkan di atas.</td></tr>'; return; }
    tb.innerHTML = rows.map((g, i) => {
      const status = rsvpMap[(g.name||"").trim().toLowerCase()] || "";
      const wa = "https://wa.me/" + waPhone(g.phone) + "?text=" + encodeURIComponent(waMessage(g));
      return `<tr>
        <td>${i+1}</td>
        <td class="name">${esc(g.name)}${g.phone ? `<br><small class="muted">${esc(g.phone)}</small>` : ""}</td>
        <td>${esc(g.pic||"")}</td>
        <td>${badge(status)}</td>
        <td><div class="actions">
          <a class="btn-sm btn-wa" href="${esc(wa)}" target="_blank" rel="noopener">Kirim WA</a>
          <button class="btn-sm btn-copy" data-idx="${i}">Salin pesan</button>
          <button class="btn-sm btn-copy" data-link="${esc(g.link||"")}">Salin link</button>
          <a class="btn-sm btn-link" href="${esc(g.link||"#")}" target="_blank" rel="noopener">Pratinjau</a>
          <button class="btn-sm btn-del" data-del="${i}" title="Hapus tamu" aria-label="Hapus tamu">🗑️</button>
        </div></td>
      </tr>`;
    }).join("");
    tb.querySelectorAll(".btn-copy[data-link]").forEach(b => b.addEventListener("click", () => {
      navigator.clipboard.writeText(b.dataset.link).then(() => {
        const o = b.textContent; b.textContent = "Tersalin ✓"; setTimeout(()=>b.textContent=o, 1200);
      });
    }));
    tb.querySelectorAll(".btn-copy[data-idx]").forEach(b => b.addEventListener("click", () => {
      navigator.clipboard.writeText(waMessage(rows[+b.dataset.idx])).then(() => {
        const o = b.textContent; b.textContent = "Tersalin ✓"; setTimeout(()=>b.textContent=o, 1200);
      });
    }));
    tb.querySelectorAll(".btn-del[data-del]").forEach(b => b.addEventListener("click", () => {
      const g = rows[+b.dataset.del];
      if (!g) return;
      if (!g.row) { alert("Fitur hapus butuh backend versi baru.\nDeploy ulang Apps Script (New version), lalu muat ulang halaman ini."); return; }
      if (!confirm(`Hapus tamu "${g.name}" dari daftar?\nTindakan ini tidak bisa dibatalkan.`)) return;
      b.disabled = true; b.textContent = "⏳";
      fetch(SHEET_URL, { method:"POST", body: JSON.stringify({ type:"hapus-tamu", row: g.row, name: g.name }) })
        .then(r => r.json()).catch(() => ({ ok: true }))  // respons tak terbaca (CORS) → anggap terkirim, muat ulang
        .then(res => {
          if (res && res.ok) { loadGuests(); }
          else {
            alert("Gagal menghapus: " + ((res && res.error) || "coba muat ulang"));
            b.disabled = false; b.textContent = "🗑️";
          }
        });
    }));
  }

  function loadGuests() {
    $("#tbl tbody").innerHTML = '<tr><td colspan="5" class="muted">Memuat…</td></tr>';
    Promise.all([
      fetch(SHEET_URL + "?type=tamu").then(r => r.json()).catch(() => ({ list: [] })),
      fetch(SHEET_URL).then(r => r.json()).catch(() => [])
    ]).then(([tamu, rsvp]) => {
      guests = (tamu && tamu.list) ? tamu.list : [];
      rsvpMap = {};
      (Array.isArray(rsvp) ? rsvp : []).forEach(w => {
        if (w.name) rsvpMap[String(w.name).trim().toLowerCase()] = w.attend || "";
      });
      render();
    });
  }

  $("#btn-add").addEventListener("click", () => {
    const name = $("#i-name").value.trim();
    if (!name) { $("#msg").textContent = "Nama wajib diisi."; return; }
    const payload = { type:"tamu", name, phone: $("#i-phone").value.trim(), pic: $("#i-pic").value.trim() };
    const btn = $("#btn-add"); btn.disabled = true; $("#msg").textContent = "Menyimpan…";
    fetch(SHEET_URL, { method:"POST", body: JSON.stringify(payload) })
      .then(() => {
        $("#i-name").value = $("#i-phone").value = ""; // biarkan petugas tetap terisi
        $("#msg").textContent = "✓ Tersimpan";
        setTimeout(() => { $("#msg").textContent = ""; loadGuests(); }, 900);
      })
      .catch(() => { $("#msg").textContent = "Gagal — cek koneksi."; })
      .finally(() => { btn.disabled = false; });
  });

  $("#search").addEventListener("input", render);
  $("#btn-refresh").addEventListener("click", loadGuests);
  $("#btn-csv").addEventListener("click", () => {
    let csv = "Nama,No WA,Petugas,RSVP,Link\n";
    guests.forEach(g => {
      const status = rsvpMap[(g.name||"").trim().toLowerCase()] || "";
      csv += `"${(g.name||'').replace(/"/g,'""')}","${g.phone||''}","${g.pic||''}","${status}","${g.link||''}"\n`;
    });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([csv], {type:"text/csv;charset=utf-8;"}));
    a.download = "daftar-tamu.csv"; a.click();
  });

  loadGuests();
</script>
</body>
</html>
